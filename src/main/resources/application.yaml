app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - https://codeclass.kro.kr

spring:
  application:
    name: codeclass-backend
  datasource:
    url: jdbc:h2:mem:codeclass;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
